<section class="section-low">
    <div class="caixa-tudo">
        <div class="estrutura-titulo">
            <p class="titulo-primario">
                Trending destinations
            </p>
            <p class="veja-tudo">
                See all
            </p>
        </div>

        <div class="caixa-destinos">

            @for (item of destinations; track item.pais){
            <div class="destino-card {{item.pais.toLowerCase()}}">
                <img class="img-destinos" src="assets/img/{{item.img}}" alt="imagem de {{item.pais}}">
                <div class="texto-destinos">
                    <p class="titulo-qualidades">{{item.pais}}</p>
                    <p class="texto-qualidades">{{item.tours}}</p>
                </div>
            </div>
            }
        </div>
    </div>

</section>
